<!-- Модалка контакта клиента (G2) -->
<div id="editContactModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h3 id="editContactModalTitle">Добавить контакт</h3>
            <button type="button" class="modal-close" onclick="closeModal('editContactModal')">×</button>
        </div>
        <div class="modal-body">
            <form id="editContactForm">
                <input type="hidden" name="contact_id" id="editContactId">
                <div class="form-group">
                    <label>Имя *</label>
                    <input type="text" name="name" class="form-control" required placeholder="Иван Иванов">
                </div>
                <div class="form-group">
                    <label>Роль</label>
                    <select name="role" class="form-control">
                        <option value="">— выберите —</option>
                        <option value="ЛПР">ЛПР</option>
                        <option value="Маркетолог">Маркетолог</option>
                        <option value="Специалист">Специалист</option>
                        <option value="Другое">Другое</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" name="phone" class="form-control" placeholder="+7 …">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" placeholder="name@company.ru">
                </div>
                <div class="form-group">
                    <label>Telegram / мессенджер</label>
                    <input type="text" name="messenger" class="form-control" placeholder="@username">
                </div>
                <div class="form-group">
                    <label>Комментарий</label>
                    <textarea name="comment" class="form-control" rows="2" placeholder="Когда звонить, заметки…"></textarea>
                </div>
                <p class="form-hint muted">Контакты хранятся только в карточке аудита и не передаются в AI-анализ.</p>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-outline" onclick="closeModal('editContactModal')">Отмена</button>
            <button type="button" class="btn btn-primary" onclick="saveContact()">Сохранить</button>
        </div>
    </div>
</div>
